<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FrameFocus — Construction Management Platform">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FrameFocus">
  <link rel="manifest" href="manifest.json">
  <title>FrameFocus</title>
  <style>
    body { background-color: #0F2A44; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    .loading { color: white; text-align: center; }
    .loading h1 { font-size: 28px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; }
    .loading p { font-size: 11px; letter-spacing: 3px; color: #8CA8C4; margin-bottom: 32px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #1A3A5C; border-top-color: #D4883E; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <h1>FrameFocus</h1>
    <p>CONSTRUCTION PLATFORM</p>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
